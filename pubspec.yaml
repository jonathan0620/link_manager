name: zoop
description: ZOOP - A Flutter link management app with Firebase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  cloud_functions: ^5.1.5
  firebase_messaging: ^15.1.6

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Utils
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  http: ^1.2.2
  html: ^0.15.5
  fluttertoast: ^8.2.8
  share_plus: ^10.0.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10

  # Share Extension
  receive_sharing_intent: ^1.8.1

  # AI
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
